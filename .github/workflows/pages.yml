name: Deploy to GitHub Pages
# Pages source must be set to "GitHub Actions" in repo Settings → Pages.

on:
  push:
    branches: [main]
  workflow_dispatch:

# Allow the workflow to publish to Pages.
permissions:
  contents: read
  pages: write
  id-token: write

# One deploy at a time.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install deps
        run: npm install
      - name: Drop server routes from the static export
        # `output: export` (static Pages build) can't host a POST route handler.
        # The real assistant route ships on Vercel; Pages keeps the in-browser
        # grounded-stub assistant via lib/assistant/client.ts's fallback.
        run: rm -rf app/api
      - name: Build static export
        env:
          # Serves the project site at https://<user>.github.io/mlr-app/
          PAGES_BASE_PATH: /mlr-app
          # Supabase public, client-safe values (repo Actions *variables*).
          NEXT_PUBLIC_SUPABASE_URL: ${{ vars.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: ${{ vars.NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY }}
          NEXT_PUBLIC_MEDIA_URL: ${{ vars.NEXT_PUBLIC_MEDIA_URL }}
        run: npm run build
      - name: Disable Jekyll (so _next/ is served)
        run: touch out/.nojekyll
      - uses: actions/configure-pages@v5
        with:
          enablement: true
      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
